<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#16213e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f3460;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e50914;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff1a25;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background rounded square -->
  <rect x="24" y="24" width="464" height="464" rx="96" ry="96" fill="url(#bgGrad)" filter="url(#shadow)"/>
  
  <!-- Film strip design -->
  <g transform="translate(256, 230)">
    <!-- Main film strip body -->
    <rect x="-160" y="-120" width="320" height="240" rx="24" ry="24" fill="none" stroke="#ffffff" stroke-width="12" opacity="0.9"/>
    
    <!-- Film strip holes - left side -->
    <circle cx="-130" cy="-80" r="14" fill="#ffffff" opacity="0.8"/>
    <circle cx="-130" cy="-30" r="14" fill="#ffffff" opacity="0.8"/>
    <circle cx="-130" cy="20" r="14" fill="#ffffff" opacity="0.8"/>
    <circle cx="-130" cy="70" r="14" fill="#ffffff" opacity="0.8"/>
    
    <!-- Film strip holes - right side -->
    <circle cx="130" cy="-80" r="14" fill="#ffffff" opacity="0.8"/>
    <circle cx="130" cy="-30" r="14" fill="#ffffff" opacity="0.8"/>
    <circle cx="130" cy="20" r="14" fill="#ffffff" opacity="0.8"/>
    <circle cx="130" cy="70" r="14" fill="#ffffff" opacity="0.8"/>
    
    <!-- Play button triangle -->
    <polygon points="-20,-50 50,0 -20,50" fill="url(#accentGrad)" filter="url(#shadow)"/>
  </g>
</svg>
